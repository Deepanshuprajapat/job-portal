{% extends "base.html" %}

{% block title %}Sign Up - ScreenAI{% endblock %}

{% block content %}
<div class="glass-container">
    <div class="form-title">Create Account</div>
    <div class="form-subtitle">Register to find jobs or screen candidates</div>
    
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username">Full Name / Username</label>
            <div style="position: relative;">
                <i data-lucide="user" style="color: var(--text-muted); position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 1.1rem; height: 1.1rem;"></i>
                <input type="text" id="username" name="username" required placeholder="John Doe" style="padding-left: 2.75rem;">
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <div style="position: relative;">
                <i data-lucide="mail" style="color: var(--text-muted); position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 1.1rem; height: 1.1rem;"></i>
                <input type="email" id="email" name="email" required placeholder="name@company.com" style="padding-left: 2.75rem;">
            </div>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position: relative;">
                <i data-lucide="lock" style="color: var(--text-muted); position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 1.1rem; height: 1.1rem;"></i>
                <input type="password" id="password" name="password" required placeholder="At least 6 characters" style="padding-left: 2.75rem;">
            </div>
        </div>

        <div class="form-group">
            <label for="role">Account Type</label>
            <div style="position: relative;">
                <i data-lucide="user-cog" style="color: var(--text-muted); position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 1.1rem; height: 1.1rem; z-index: 10;"></i>
                <select id="role" name="role" required style="padding-left: 2.75rem;">
                    <option value="candidate">Job Candidate (Upload Resume & Apply)</option>
                    <option value="recruiter">Recruiter (Post Jobs & Screen Resumes)</option>
                </select>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="user-plus" style="width: 1.1rem; height: 1.1rem;"></i> Create Account
        </button>
    </form>
    
    <div class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
    </div>
</div>
{% endblock %}
